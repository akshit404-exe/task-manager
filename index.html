<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Task Manager | PRo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Aurora Blobs -->
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main>
        <div class="glass-card">
            <header>
                <div class="badge">PRO VERSION</div>
                <h1>Tasks</h1>
                <p class="subtitle">Stay focused, be productive.</p>
            </header>

            <div class="input-section">
                <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off">
                <button id="add-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <span id="pending-count">0</span>
                    <label>Remaining</label>
                </div>
                <div class="stat-item">
                    <span id="complete-count">0</span>
                    <label>Completed</label>
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Done</button>
            </div>

            <ul id="todo-list">
                <!-- Tasks injected here -->
            </ul>

            <div class="card-footer">
                <button id="clear-completed" class="secondary-btn">Clear finished tasks</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
